#    steps:
#      - uses: actions/checkout@v4
#      - uses: actions/setup-python@v5
#        with:
#          python-version: "3.11"
#          cache: pip
#          cache-dependency-path: gido/backend/requirements.txt
#      - run: |
#          python -m pip install --upgrade pip
#          pip install -r requirements.txt pytest
#      - run: pytest -q

  compliance:
    name: Open-source compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject legacy dataworks naming in source
        run: |
          set -euo pipefail
          matches="$(grep -ri dataworks . \
            --include='*.py' \
            --include='*.ts' \
            --include='*.tsx' \
            --include='*.yml' \
            --include='*.yaml' \
            --include='*.json' \
            --include='*.sh' \
            --include='*.sql' \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=.venv \
            --exclude-dir=__pycache__ \
            --exclude-dir=.github \
            --exclude='MIGRATION_FROM_DATAWORKS.md' \
            --exclude='add_spdx_headers.py' \
            || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "::error::Found legacy dataworks references"
            exit 1
          fi
      - name: Reject secrets in tracked env files
        run: |
          set -euo pipefail
          matches="$(grep -rE "(DS_TOKEN|SECRET_KEY|INTERNAL_TOKEN)=[^[:space:]]+" gido \
            --include="*.env" \
            | grep -v '.example' \
            || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "::error::Found secret-like values in .env files (use .env.example only)"
            exit 1
          fi
      - name: Verify SPDX headers in gido source
        run: python gido/scripts/add_spdx_headers.py
      - name: Fail if SPDX script modified files
        run: |
          if [ -n "$(git status --porcelain gido)" ]; then
            git status --porcelain gido
            echo "::error::Missing SPDX headers; run gido/scripts/add_spdx_headers.py"
            exit 1
          fi

  docker-backend:
    name: Build and push Backend image to GHCR
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for backend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/gido-backend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=${{ github.ref_name }}-

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: gido/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  docker-frontend:
    name: Build and push Frontend image to GHCR
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for frontend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/gido-frontend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=${{ github.ref_name }}-

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: gido/frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 单次 docker build（context: k8s/flink-sql-runner）仅推送 gido-flink-runtime 至 GHCR。
  # sql-runner 指镜像内 JAR（/opt/flink/usrlib/sql-runner.jar），非独立容器镜像。
  docker-flink-runtime:
    name: Build and push Flink runtime image to GHCR
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 从 pom.xml 中提取 Flink 版本号
      - name: Extract Flink version from pom.xml
        id: extract_flink_version
        run: |
          FLINK_VERSION=$(grep -oP '<flink\.version>\K[^<]+' k8s/flink-sql-runner/pom.xml)
          echo "FLINK_VERSION=${FLINK_VERSION}" >> $GITHUB_OUTPUT
          echo "提取到 Flink 版本: ${FLINK_VERSION}"

#      - name: Check if Flink runtime files changed
#        id: check_flink_change
#        run: |
#          # 检测 Flink 相关文件是否变更
#          FLINK_FILES="k8s/flink-sql-runner/ k8s/flink-runtime/ k8s/lib/flink-sql-runner-image.sh k8s/build-flink-runtime.sh"
#          CHANGED=$(git diff --name-only HEAD~1 HEAD -- $FLINK_FILES || true)
#          if [ -n "$CHANGED" ]; then
#            echo "flink_changed=true" >> $GITHUB_OUTPUT
#            echo "Changed files:"
#            echo "$CHANGED"
#          else
#            echo "flink_changed=false" >> $GITHUB_OUTPUT
#            echo "No Flink runtime files changed, skipping build"
#          fi

      - name: Set up Docker Buildx
#        if: steps.check_flink_change.outputs.flink_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
#        if: steps.check_flink_change.outputs.flink_changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for flink-runtime
#        if: steps.check_flink_change.outputs.flink_changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/gido-flink-runtime
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=${{ github.ref_name }}-,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=${{ steps.extract_flink_version.outputs.FLINK_VERSION }}

      - name: Build and push flink-runtime image
#        if: steps.check_flink_change.outputs.flink_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: k8s/flink-sql-runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TARGETPLATFORM=linux/amd64
            FLINK_BASE_IMAGE=apache/flink:${{ steps.extract_flink_version.outputs.FLINK_VERSION }}-java11
            MAVEN_IMAGE=maven:3.9-eclipse-temurin-11