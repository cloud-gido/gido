#        working-directory: gido/backend
#    steps:
#      - uses: actions/checkout@v4
#      - uses: actions/setup-python@v5
#        with:
#          python-version: "3.11"
#          cache: pip
#          cache-dependency-path: gido/backend/requirements.txt
#      - run: |
#          python -m pip install --upgrade pip
#          pip install -r requirements.txt pytest
#      - run: pytest -q

  compliance:
    name: Open-source compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject legacy dataworks naming in source
        run: |
          set -euo pipefail
          matches="$(grep -ri dataworks . \
            --include='*.py' \
            --include='*.ts' \
            --include='*.tsx' \
            --include='*.yml' \
            --include='*.yaml' \
            --include='*.json' \
            --include='*.sh' \
            --include='*.sql' \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=.venv \
            --exclude-dir=__pycache__ \
            --exclude-dir=.github \
            --exclude='MIGRATION_FROM_DATAWORKS.md' \
            --exclude='add_spdx_headers.py' \
            || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "::error::Found legacy dataworks references"
            exit 1
          fi
      - name: Reject secrets in tracked env files
        run: |
          set -euo pipefail
          matches="$(grep -rE "(DS_TOKEN|SECRET_KEY|INTERNAL_TOKEN)=[^[:space:]]+" gido \
            --include="*.env" \
            | grep -v '.example' \
            || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "::error::Found secret-like values in .env files (use .env.example only)"
            exit 1
          fi
      - name: Verify SPDX headers in gido source
        run: python gido/scripts/add_spdx_headers.py
      - name: Fail if SPDX script modified files
        run: |
          if [ -n "$(git status --porcelain gido)" ]; then
            git status --porcelain gido
            echo "::error::Missing SPDX headers; run gido/scripts/add_spdx_headers.py"
            exit 1
          fi

  docker-images:
    name: Build and push images to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract Flink version from pom.xml
        id: extract_flink_version
        run: |
          FLINK_VERSION=$(grep -oP '<flink\.version>\K[^<]+' k8s/flink-sql-runner/pom.xml)
          echo "FLINK_VERSION=${FLINK_VERSION}" >> $GITHUB_OUTPUT
          echo "Flink version: ${FLINK_VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Wait for GHCR and log in (single login for all images)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          wait_ghcr() {
            local attempt code
            for attempt in $(seq 1 8); do
              code=$(curl -s -o /dev/null -w "%{http_code}" \
                --connect-timeout 20 --max-time 45 \
                "https://ghcr.io/v2/" || true)
              if [ "${code}" = "401" ] || [ "${code}" = "200" ]; then
                echo "GHCR reachable (HTTP ${code}) on attempt ${attempt}"
                return 0
              fi
              echo "GHCR unreachable (HTTP ${code:-000}) attempt ${attempt}/8, sleep 25s..."
              sleep 25
            done
            return 1
          }
          login_ghcr() {
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${REGISTRY_USER}" --password-stdin
          }
          for attempt in $(seq 1 5); do
            wait_ghcr || true
            if login_ghcr; then
              echo "GHCR login succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "GHCR login attempt ${attempt}/5 failed, retry in 30s..."
            sleep 30
          done
          echo "::error::GHCR login failed after 5 attempts"
          exit 1

      - name: Extract metadata (tags, labels) for backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/gido-backend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=${{ github.ref_name }}-

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: gido/backend
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Extract metadata (tags, labels) for frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/gido-frontend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=${{ github.ref_name }}-

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: gido/frontend
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

      - name: Extract metadata (tags, labels) for flink-runtime
        id: meta_flink
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/gido-flink-runtime
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=${{ github.ref_name }}-,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=${{ steps.extract_flink_version.outputs.FLINK_VERSION }}

      - name: Build and push flink-runtime image
        uses: docker/build-push-action@v5
        with:
          context: k8s/flink-sql-runner
          push: true
          no-cache: true
          tags: ${{ steps.meta_flink.outputs.tags }}
          labels: ${{ steps.meta_flink.outputs.labels }}
          build-args: |
            TARGETPLATFORM=linux/amd64
            FLINK_BASE_IMAGE=apache/flink:${{ steps.extract_flink_version.outputs.FLINK_VERSION }}-java11
            MAVEN_IMAGE=maven:3.9-eclipse-temurin-11

      - name: Verify Flink runtime image (Paimon S3 deps)
        run: |
          chmod +x k8s/flink-sql-runner/verify-image.sh
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/gido-flink-runtime:${{ steps.extract_flink_version.outputs.FLINK_VERSION }}"
          for attempt in $(seq 1 5); do
            if docker pull "${IMAGE}"; then
              bash k8s/flink-sql-runner/verify-image.sh "${IMAGE}"
              exit 0
            fi
            echo "docker pull attempt ${attempt}/5 failed, retry in 20s..."
            sleep 20
          done
          echo "::error::docker pull ${IMAGE} failed after 5 attempts"
          exit 1