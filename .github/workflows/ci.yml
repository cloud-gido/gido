name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # org 仓库 push 包须用 owner 作用户名，不能用 github.actor
  REGISTRY_USER: ${{ github.repository_owner }}

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gido/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gido/frontend/package-lock.json
      - run: npm ci
      - run: npm run build

#  backend:
#    name: Backend tests
#    runs-on: ubuntu-latest
#    defaults:
