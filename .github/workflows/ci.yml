name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gido/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gido/frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gido/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: gido/backend/requirements.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - run: pytest -q

  compliance:
    name: Open-source compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject legacy dataworks naming in source
        run: |
          set -euo pipefail
          matches="$(grep -ri dataworks . \
            --include='*.py' \
            --include='*.ts' \
            --include='*.tsx' \
            --include='*.yml' \
            --include='*.yaml' \
            --include='*.json' \
            --include='*.sh' \
            --include='*.sql' \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=.venv \
            --exclude-dir=__pycache__ \
            --exclude='MIGRATION_FROM_DATAWORKS.md' \
            --exclude='add_spdx_headers.py' \
            || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "::error::Found legacy dataworks references"
            exit 1
          fi
      - name: Reject secrets in tracked env files
        run: |
          set -euo pipefail
          matches="$(grep -rE "(DS_TOKEN|SECRET_KEY|INTERNAL_TOKEN)=[^[:space:]]+" gido \
            --include="*.env" \
            | grep -v '.example' \
            || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "::error::Found secret-like values in .env files (use .env.example only)"
            exit 1
          fi
      - name: Verify SPDX headers in gido source
        run: python gido/scripts/add_spdx_headers.py
      - name: Fail if SPDX script modified files
        run: |
          if [ -n "$(git status --porcelain gido)" ]; then
            git status --porcelain gido
            echo "::error::Missing SPDX headers; run gido/scripts/add_spdx_headers.py"
            exit 1
          fi
