#      - run: pytest -q

  compliance:
    name: Open-source compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject legacy dataworks naming in source
        run: |
          set -euo pipefail
          matches="$(grep -ri dataworks . \
            --include='*.py' \
            --include='*.ts' \
            --include='*.tsx' \
            --include='*.yml' \
            --include='*.yaml' \
            --include='*.json' \
            --include='*.sh' \
            --include='*.sql' \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=.venv \
            --exclude-dir=__pycache__ \
            --exclude-dir=.github \
            --exclude='MIGRATION_FROM_DATAWORKS.md' \
            --exclude='add_spdx_headers.py' \
            || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "::error::Found legacy dataworks references"
            exit 1
          fi
      - name: Reject secrets in tracked env files
        run: |
          set -euo pipefail
          matches="$(grep -rE "(DS_TOKEN|SECRET_KEY|INTERNAL_TOKEN)=[^[:space:]]+" gido \
            --include="*.env" \
            | grep -v '.example' \
            || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "::error::Found secret-like values in .env files (use .env.example only)"
            exit 1
          fi
      - name: Verify SPDX headers in gido source
        run: python gido/scripts/add_spdx_headers.py
      - name: Fail if SPDX script modified files
        run: |
          if [ -n "$(git status --porcelain gido)" ]; then
            git status --porcelain gido
            echo "::error::Missing SPDX headers; run gido/scripts/add_spdx_headers.py"
            exit 1
          fi

  docker-backend:
    name: Build and push Backend image to GHCR
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for backend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/gido-backend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=${{ github.ref_name }}-

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: gido/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  docker-frontend:
    name: Build and push Frontend image to GHCR
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for frontend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/gido-frontend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=${{ github.ref_name }}-

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: gido/frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}