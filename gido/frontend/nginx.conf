server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico {
        default_type image/svg+xml;
        alias /usr/share/nginx/html/favicon.svg;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~* ^/(favicon\.svg|apple-touch-icon\.svg|site\.webmanifest)$ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # 须与 docker-compose 中的「服务名」一致（本仓库为 backend），勿写 container_name
    location /api {
        # 默认 1m 会导致 Flink JAR 上传被截断，表现为上传失败或 413
        client_max_body_size 256m;
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 提交 Flink SQL 会轮询网关，易超过默认 60s，否则浏览器看到 504
        proxy_connect_timeout 60s;
        proxy_send_timeout 320s;
        proxy_read_timeout 320s;
    }
}
