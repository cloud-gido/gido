# =============================================================================
# GIDO 全栈（同集群 + 已部署的 k8s/flink.yaml）
# =============================================================================
#
# 镜像占位符 __BACKEND_IMAGE__ / __FRONTEND_IMAGE__ 由 k8s/apply-gido-stack.sh 替换后 apply。
#
# 一键（见脚本）：
#   bash k8s/apply-gido-stack.sh
#
# 手工：
#   1) kubectl apply -f k8s/flink.yaml
#   2) sed "s|__BACKEND_IMAGE__|你的后端镜像|g;s|__FRONTEND_IMAGE__|你的前端镜像|g" k8s/gido.yaml | kubectl apply -f -
#   3) kubectl apply -f k8s/gido-ingress.yaml   # 可选，需集群有 Ingress Controller
#   4) kubectl -n gido port-forward svc/frontend 8080:80
#
# 默认带：命名空间 gido、Redis、开发用 MySQL（emptyDir，Pod 重建丢数据）、后端、前端。
# 需要持久化时自行改为 PVC 并备份。
#
# 登录：admin / admin123（见 ConfigMap GIDO_BOOTSTRAP_ADMIN_PASSWORD，上线请改）
#
# =============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: gido
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gido-backend-config
  namespace: gido
data:
  FLINK_URL: "http://flink-jobmanager.flink.svc.cluster.local:8081"
  FLINK_SQL_GATEWAY_URL: "http://flink-sql-gateway.flink.svc.cluster.local:8083"
  FLINK_GATEWAY_JOBMANAGER_REST_URL: "http://flink-jobmanager.flink.svc.cluster.local:8081"
  FLINK_UI_URL: "http://flink-jobmanager.flink.svc.cluster.local:8081"
  FLINK_K8S_APPLICATION_IMAGE: "apache/flink:2.0.1-java11"
  FLINK_K8S_NAMESPACE: "flink"
  FLINK_K8S_CLUSTER_DOMAIN: "cluster.local"
  FLINK_K8S_APPLICATION_JM_REST_TEMPLATE: "http://{cluster_id}-rest.flink.svc.cluster.local:8081"
  FLINK_K8S_REST_EXPOSED_TYPE: "ClusterIP"
  FLINK_K8S_JM_NODEPORT_HOST: "127.0.0.1"
  REDIS_URL: "redis://redis:6379/0"
  DS_ENABLED: "false"
  DS_URL: "http://dolphinscheduler-api:12345/dolphinscheduler"
  DS_UI_URL: ""
  DS_PROJECT_NAME: "GIDO"
  INTERNAL_TOKEN: ""
  GIDO_BOOTSTRAP_ADMIN_PASSWORD: "admin123"
  GIDO_FLINK_K8S_API_PATCH: "disable"
---
# 与内置 MySQL 密码一致；生产务必 kubectl delete secret -n gido gido-secrets 后自建强密码
apiVersion: v1
kind: Secret
metadata:
  name: gido-secrets
  namespace: gido
type: Opaque
stringData:
  mysql-root-password: "DwK8sMysqlDev!72"
  DATABASE_URL: "mysql+pymysql://root:DwK8sMysqlDev!72@mysql:3306/gido?charset=utf8mb4"
  SECRET_KEY: "gido-k8s-dev-secret-rotate-me-in-production-48chars"
  DS_TOKEN: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: gido
  labels:
    app: gido
    component: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gido
      component: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: gido
        component: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gido-secrets
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: gido
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            - --default-authentication-plugin=mysql_native_password
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: gido
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: gido
    component: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: gido
  labels:
    app: gido
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gido
      component: redis
  template:
    metadata:
      labels:
        app: gido
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: gido
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: gido
    component: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gido-backend
  namespace: gido
  labels:
    app: gido
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gido
      component: backend
  template:
    metadata:
      labels:
        app: gido
        component: backend
    spec:
      initContainers:
        - name: wait-mysql
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until nc -z mysql 3306; do echo waiting mysql; sleep 2; done
        - name: wait-redis
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until nc -z redis 6379; do echo waiting redis; sleep 2; done
      containers:
        - name: backend
          image: __BACKEND_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: gido-backend-config
            - secretRef:
                name: gido-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: gido
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  selector:
    app: gido
    component: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gido-frontend
  namespace: gido
  labels:
    app: gido
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gido
      component: frontend
  template:
    metadata:
      labels:
        app: gido
        component: frontend
    spec:
      initContainers:
        - name: wait-backend
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until wget -qO- http://backend:8001/health >/dev/null 2>&1; do
                echo waiting backend; sleep 2
              done
      containers:
        - name: frontend
          image: __FRONTEND_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: gido
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: gido
    component: frontend
