

# =============================================================================
# GIDO 最小 K8s 栈：PostgreSQL + backend + frontend（Operator JAR 生产路径）
# =============================================================================
#
# 不包含：DolphinScheduler、Flink Session/Gateway、Redis、Kafka。
# 实时 JAR 走 Flink Kubernetes Operator（须已装 Operator + namespace flink）。
#
# 镜像占位符由 k8s/apply-gido-stack.sh 替换：
#   __BACKEND_IMAGE__ / __FRONTEND_IMAGE__ / __FLINK_OPERATOR_IMAGE__
#
# 技术栈：Flink Kubernetes Operator 1.15 + Flink 2.0.1（Session / Operator 统一）
# 完整说明见 k8s/README.md；Operator 升级见 k8s/upgrade-flink-operator-1.15.sh
#
# 一键（Kind）：
#   KUBECONFIG=~/.kube/kind-gido.yaml KIND_CLUSTER_NAME=gido bash k8s/apply-gido-stack.sh
#
# 前置：kubectl apply -f k8s/flink-operator-rbac.yaml
#
# 访问：kubectl -n gido port-forward svc/frontend 8080:80 → http://127.0.0.1:8080
# 登录：admin / admin123（生产请改 Secret）
#
# JAR/SQL 制品：默认 PVC（gido-jar-artifacts）；EKS 生产推荐 S3（见 k8s/eks/）。
# 设置 FLINK_OPERATOR_JAR_S3_PREFIX 后 Operator 从 s3:// 拉取，Backend 须 IRSA 写 S3。
# PostgreSQL 仍使用 emptyDir，Pod 重建丢库；生产请为 postgres 也改 PVC。
#
# =============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: gido
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gido-backend-config
  namespace: gido
data:
  # 统一提交：仅 Flink Operator（Session/Application 须 GIDO_LEGACY_FLINK_SUBMIT=true）
  GIDO_FLINK_SUBMIT_MODE: "operator"
  GIDO_LEGACY_FLINK_SUBMIT: "false"
  PAIMON_WAREHOUSE_DEFAULT: "s3://gido-paimon-warehouse"
  # Session Flink / SQL Gateway（本清单不部署；遗留模式才需要）
  FLINK_URL: ""
  FLINK_SQL_GATEWAY_URL: ""
  FLINK_GATEWAY_JOBMANAGER_REST_URL: ""
  FLINK_UI_URL: ""
  FLINK_K8S_APPLICATION_IMAGE: "__FLINK_OPERATOR_IMAGE__"
  FLINK_K8S_NAMESPACE: "flink"
  FLINK_K8S_CLUSTER_DOMAIN: "cluster.local"
  FLINK_K8S_APPLICATION_JM_REST_TEMPLATE: "http://{cluster_id}-rest.flink.svc.cluster.local:8081"
  FLINK_K8S_REST_EXPOSED_TYPE: "LoadBalancer"
  # 浏览器经 GIDO 反向代理打开 Flink UI，无需再 port-forward JM（只保留 frontend 8080 即可）
  FLINK_OPERATOR_UI_PROXY_ENABLED: "true"
  FLINK_OPERATOR_NAMESPACE: "flink"
  FLINK_OPERATOR_JM_REST_TEMPLATE: "http://{deployment_name}-rest.{namespace}.svc.cluster.local:8081"
  FLINK_OPERATOR_UI_URL_TEMPLATE: ""
  # 生产浏览器 UI 示例（配合 Ingress）：
  # FLINK_OPERATOR_UI_URL_TEMPLATE: "https://{deployment_name}-flink.your-company.com"
  FLINK_OPERATOR_DEV_LOCAL: "false"
  FLINK_OPERATOR_AUTO_UI_TUNNEL: "false"
  FLINK_OPERATOR_JAR_HTTP_BASE: "http://backend.gido.svc.cluster.local:8001"
  FLINK_OPERATOR_IMAGE: "__FLINK_OPERATOR_IMAGE__"
  FLINK_OPERATOR_FLINK_VERSION: "v2_0"
  FLINK_OPERATOR_SERVICE_ACCOUNT: "flink"
  FLINK_OPERATOR_UPGRADE_MODE: "stateless"
  FLINK_OPERATOR_JM_MEMORY: "2048m"
  FLINK_OPERATOR_TM_MEMORY: "2048m"
  FLINK_OPERATOR_JM_CPU: "1"
  FLINK_OPERATOR_TM_CPU: "1"
  FLINK_OPERATOR_TASK_SLOTS: "2"
  # SQL Operator：镜像须含 sql-runner.jar（见 Flink Operator flink-sql-runner-example）
  FLINK_OPERATOR_SQL_RUNNER_JAR_URI: "local:///opt/flink/usrlib/sql-runner.jar"
  FLINK_OPERATOR_SQL_RUNNER_ENTRY_CLASS: "com.gido.flink.SqlRunner"
  JAR_ARTIFACT_DIR: "/data/jar-artifacts"
  DS_ENABLED: "false"
  DS_URL: ""
  DS_UI_URL: ""
  DS_PROJECT_NAME: "GIDO"
  INTERNAL_TOKEN: ""
  GIDO_BOOTSTRAP_ADMIN_PASSWORD: "admin123"
  GIDO_FLINK_K8S_API_PATCH: "disable"
---
# 与内置 PostgreSQL 密码一致；生产务必 kubectl delete secret -n gido gido-secrets 后自建强密码
apiVersion: v1
kind: Secret
metadata:
  name: gido-secrets
  namespace: gido
type: Opaque
stringData:
  postgres-password: "DolphinPgDev!72"
  DATABASE_URL: "postgresql+psycopg2://root:DolphinPgDev%2172@postgres:5432/gido"
  SECRET_KEY: "gido-k8s-dev-secret-rotate-me-in-production-48chars"
  FLINK_OPERATOR_ARTIFACT_TOKEN: "gido-k8s-artifact-token-rotate-in-prod"
  DS_TOKEN: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: gido
data:
  02-create-gido-db.sql: |
    CREATE DATABASE gido;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: gido
  labels:
    app: gido
    component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gido
      component: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: gido
        component: postgres
    spec:
      containers:
        - name: postgres
          image: docker.m.daocloud.io/library/postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "root"
            - name: POSTGRES_DB
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gido-secrets
                  key: postgres-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U root -d gido
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: gido
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: gido
    component: postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gido-jar-artifacts
  namespace: gido
  labels:
    app: gido
    component: backend
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gido-backend
  namespace: gido
  labels:
    app: gido
    component: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gido
      component: backend
  template:
    metadata:
      labels:
        app: gido
        component: backend
    spec:
      serviceAccountName: gido-backend
      initContainers:
        - name: wait-postgres
          image: docker.m.daocloud.io/library/busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until nc -z postgres 5432; do echo waiting postgres; sleep 2; done
      containers:
        - name: backend
          image: __BACKEND_IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: gido-backend-config
            - secretRef:
                name: gido-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: jar-artifacts
              mountPath: /data/jar-artifacts
      volumes:
        - name: jar-artifacts
          persistentVolumeClaim:
            claimName: gido-jar-artifacts
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gido-backend
  namespace: gido
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gido-flink-operator
  namespace: flink
rules:
  - apiGroups: ["flink.apache.org"]
    resources: ["flinkdeployments", "flinksessionjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "pods", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gido-backend-flink-operator
  namespace: flink
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gido-flink-operator
subjects:
  - kind: ServiceAccount
    name: gido-backend
    namespace: gido
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: gido
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  selector:
    app: gido
    component: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gido-frontend
  namespace: gido
  labels:
    app: gido
    component: frontend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gido
      component: frontend
  template:
    metadata:
      labels:
        app: gido
        component: frontend
    spec:
      initContainers:
        - name: wait-backend
          image: docker.m.daocloud.io/library/busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until wget -qO- http://backend:8001/health >/dev/null 2>&1; do
                echo waiting backend; sleep 2
              done
      containers:
        - name: frontend
          image: __FRONTEND_IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: gido
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: gido
    component: frontend
