# 可选：开发环境 Paimon 本地 warehouse（file://）
# 生产请使用对象存储（s3:// / oss://）并在 gido-backend-config 设置 PAIMON_WAREHOUSE_DEFAULT。
#
# 挂载示例（FlinkDeployment podTemplate，由运维在 Operator CR 中追加）：
#   volumes:
#     - name: paimon-warehouse
#       persistentVolumeClaim:
#         claimName: paimon-warehouse
#   volumeMounts:
#     - name: paimon-warehouse
#       mountPath: /opt/flink/paimon-warehouse
# 对应 warehouse：file:///opt/flink/paimon-warehouse
#
# 应用：kubectl apply -f k8s/paimon-warehouse-pvc.yaml
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paimon-warehouse
  namespace: flink
  labels:
    app: gido
    component: paimon-warehouse
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
