

# Doris 示例清单（与 Flink 等统一放在仓库根 k8s/；原路径 gido/k8s/doris-fixed.yaml 已废弃）。
# 使用：kubectl apply -f k8s/doris-fixed.yaml（按需调整镜像与存储）。
---
apiVersion: v1
kind: Namespace
metadata:
  name: doris

---
# FE Service (Headless for StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: doris-fe
  namespace: doris
spec:
  clusterIP: None
  selector:
    app: doris-fe
  ports:
  - port: 9030
    name: mysql
  - port: 8030
    name: http
  - port: 9010
    name: rpc

---
# FE NodePort Service (外部访问)
apiVersion: v1
kind: Service
metadata:
  name: doris-fe-external
  namespace: doris
spec:
  type: NodePort
  selector:
    app: doris-fe
  ports:
  - port: 9030
    targetPort: 9030
    nodePort: 30030
    name: mysql
  - port: 8030
    targetPort: 8030
    nodePort: 30080
    name: http

---
# FE StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: doris-fe
  namespace: doris
spec:
  serviceName: doris-fe
  replicas: 1
  selector:
    matchLabels:
      app: doris-fe
  template:
    metadata:
      labels:
        app: doris-fe
    spec:
      containers:
      - name: doris-fe
        image: apache/doris:fe-latest
        imagePullPolicy: IfNotPresent
        env:
        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: FE_SERVERS
          value: "fe1:$(MY_POD_IP):9010"
        - name: FE_ID
          value: "1"
        ports:
        - containerPort: 8030
          name: http
        - containerPort: 9030
          name: mysql
        - containerPort: 9010
          name: rpc
        volumeMounts:
        - name: fe-data
          mountPath: /opt/apache-doris/fe/doris-meta
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"
        livenessProbe:
          tcpSocket:
            port: 9030
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 9030
          initialDelaySeconds: 30
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: fe-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi

---
# BE Service (Headless)
apiVersion: v1
kind: Service
metadata:
  name: doris-be
  namespace: doris
spec:
  clusterIP: None
  selector:
    app: doris-be
  ports:
  - port: 9060
    name: heartbeat
  - port: 8040
    name: http
  - port: 9050
    name: brpc

---
# BE StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: doris-be
  namespace: doris
spec:
  serviceName: doris-be
  replicas: 1
  selector:
    matchLabels:
      app: doris-be
  template:
    metadata:
      labels:
        app: doris-be
    spec:
      containers:
      - name: doris-be
        image: apache/doris:be-latest
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        args:
        - |
          FE_IP=$(getent hosts doris-fe-0.doris-fe.doris.svc.cluster.local | awk '{print $1}')
          while [ -z "$FE_IP" ]; do
            echo "Waiting for FE DNS..."
            sleep 3
            FE_IP=$(getent hosts doris-fe-0.doris-fe.doris.svc.cluster.local | awk '{print $1}')
          done
          exec /opt/apache-doris/be_entrypoint.sh "${FE_IP}"
        env:
        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        ports:
        - containerPort: 9060
          name: heartbeat
        - containerPort: 8040
          name: http
        - containerPort: 9050
          name: brpc
        volumeMounts:
        - name: be-data
          mountPath: /opt/apache-doris/be/storage
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
        livenessProbe:
          tcpSocket:
            port: 9060
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 9060
          initialDelaySeconds: 30
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: be-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi
