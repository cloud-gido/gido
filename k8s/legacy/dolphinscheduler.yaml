#   µ£¼µĖģÕŹĢõĖ║ Master/Worker µ│©Õģź SPRING_APPLICATION_JSON µöŠÕ«Į server-load-protection ÕåģÕŁśķśłÕĆ╝’╝łDocker Desktop ÕĖĖĶ¦ü’╝ēŃĆé
# õ╗╗ÕŖĪÕ«×õŠŗ host õĖ║ń®║’╝ÜWorker Õ£© K8s ÕåģĶć¬ÕŖ©µÄ©µ¢ŁÕ£░ÕØĆµśōÕż▒Ķ┤ź’╝īÕĘ▓ńö© Pod IP + listen-port µ│©Õģź worker.worker-address’╝łJAVA_TOOL_OPTIONS’╝ēŃĆé
# Master/API/Worker/Alert ĶŗźÕÅŹÕżŹµŖź V1ConfigMap Reflector / ApiException’╝ÜÕĘ▓ÕÉłÕ╣ČÕģ│ķŚŁ spring.cloud.kubernetes’╝łÕÉ½ config ÕŁÉÕ╝ĆÕģ│’╝ē+ SPRING_CLOUD_* + JAVA_TOOL_OPTIONS -DŌĆ”’╝øapply ÕÉÄÕŖĪÕ┐ģ rollout ķćŹÕÉ»õĮ┐Ķ┐øń©ŗķćŹµ¢░ÕŖĀĶĮĮŃĆé
