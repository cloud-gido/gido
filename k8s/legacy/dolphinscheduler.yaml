#
# Ķŗź Pod ķĢ┐µ£¤ Pending’╝ÜDocker Desktop ŌåÆ Settings ŌåÆ Resources Ķ░āķ½ś MemoryŃĆé
# Ķŗźķ”¢µ¼Īń╝║ĶĪ©’╝ÜAPI Pod Õåģ init õ╝ÜĶć¬ÕŖ©µē¦ĶĪī apache/dolphinscheduler-tools ńÜä upgrade-schema.sh’╝īµŚĀķ£ĆµēŗÕĘź JobŃĆé
