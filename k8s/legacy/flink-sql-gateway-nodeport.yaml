

# 可选：固定 NodePort 32483，便于不经过 Ingress 时从宿主访问 SQL Gateway。
# 先 kubectl apply -f k8s/legacy/flink.yaml，再按需 apply 本文件。
apiVersion: v1
kind: Service
metadata:
  name: flink-sql-gateway-nodeport
  namespace: flink
spec:
  type: NodePort
  selector:
    app: flink
    component: sql-gateway
  ports:
    - name: rest
      port: 8083
      targetPort: 8083
      nodePort: 32483
