# MySQL CDC 源库凭证（勿提交明文；生产用 External Secrets / Secrets Manager）
#
# 用法 A（推荐）：在 Stream Studio SQL 中直接填写 hostname / username / password。
# 用法 B：FlinkDeployment podTemplate 注入环境变量，SQL 中用 '${MYSQL_CDC_PASSWORD}' 等
#         （须作业级 podTemplate，GIDO 默认 SQL 走 ConfigMap 挂载，不含 MySQL Secret）。
#
# 网络：RDS 安全组须放行 EKS worker 节点安全组 → 3306。
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-cdc-source
  namespace: flink
  labels:
    app: gido
    component: mysql-cdc
type: Opaque
stringData:
  hostname: "your-mysql.cluster-xxxxx.ap-northeast-1.rds.amazonaws.com"
  port: "3306"
  username: "cdc_user"
  password: "REPLACE_ME"
  database: "shop"
  table: "orders"
