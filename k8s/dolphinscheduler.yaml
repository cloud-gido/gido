# و‍¶و‍„ï¼ڑPostgreSQLأ—1م€پZooKeeperأ—1م€پAPIأ—1م€پMasterأ—1م€پWorkerأ—1م€پAlertأ—1م€‚
# و‰€وœ‰ Deployment ن½؟ç”¨ **Recreate** ç­–ç•¥ï¼Œéپ؟ه…چو»ڑهٹ¨و›´و–°و—¶ه‡؛çژ°م€ŒهڈŒ Podم€چه¯¼è‡´ port-forward è؟‍هˆ°وœھç›‘هگ¬ç«¯هڈ£م€‚
#
# é•œهƒڈï¼ˆن¸ژ Docker Desktop وœ¬هœ°ç¼“ه­کن¸€è‡´ï¼Œtag 3.2.2ï¼‰ï¼ڑ
#   apache/dolphinscheduler-api / master / worker / alert-server
# ن¾‌èµ–ï¼ڑpostgres:15-alpineم€پzookeeper:3.9
#
# éƒ¨ç½²ï¼ڑkubectl apply -f k8s/dolphinscheduler.yaml
# UIï¼ڑkubectl -n dolphinscheduler port-forward svc/dolphinscheduler-api 12345:12345
#      â†’ http://127.0.0.1:12345/dolphinscheduler/ui  ï¼ˆadmin / dolphinscheduler123ï¼‰
#
# GIDO هگŒé›†ç¾¤ DS_URL ç¤؛ن¾‹ï¼ڑ
#   http://dolphinscheduler-api.dolphinscheduler.svc.cluster.local:12345/dolphinscheduler
#
# è‹¥ Pod é•؟وœں Pendingï¼ڑDocker Desktop â†’ Settings â†’ Resources è°ƒé«ک Memoryم€‚
# è‹¥é¦–و¬،ç¼؛è،¨ï¼ڑAPI Pod ه†… init ن¼ڑè‡ھهٹ¨و‰§è،Œ apache/dolphinscheduler-tools çڑ„ upgrade-schema.shï¼Œو— éœ€و‰‹ه·¥ Jobم€‚
# Master/Worker و—¥ه؟—è‹¥ه‡؛çژ° SystemMemoryUsedPercentage è¶…è؟‡ 0.7 ه¯¼è‡´ BUSYم€پUIم€Œèٹ‚ç‚¹ن¸چه­کهœ¨م€چï¼ڑ
#   وœ¬و¸…هچ•ن¸؛ Master/Worker و³¨ه…¥ SPRING_APPLICATION_JSON و”¾ه®½ server-load-protection ه†…ه­کéکˆه€¼ï¼ˆDocker Desktop ه¸¸è§پï¼‰م€‚
# ن»»هٹ،ه®‍ن¾‹ host ن¸؛ç©؛ï¼ڑWorker هœ¨ K8s ه†…è‡ھهٹ¨وژ¨و–­هœ°ه‌€وک“ه¤±è´¥ï¼Œه·²ç”¨ Pod IP + listen-port و³¨ه…¥ worker.worker-addressï¼ˆJAVA_TOOL_OPTIONSï¼‰م€‚
# Master/API/Worker/Alert è‹¥هڈچه¤چوٹ¥ V1ConfigMap Reflector / ApiExceptionï¼ڑه·²هگˆه¹¶ه…³é—­ spring.cloud.kubernetesï¼ˆهگ« config ه­گه¼€ه…³ï¼‰+ SPRING_CLOUD_* + JAVA_TOOL_OPTIONS -Dâ€¦ï¼›apply هگژهٹ،ه؟… rollout é‡چهگ¯ن½؟è؟›ç¨‹é‡چو–°هٹ è½½م€‚
# =============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: dolphinscheduler
---
apiVersion: v1
kind: Secret
metadata:
  name: dolphinscheduler-secrets
  namespace: dolphinscheduler
type: Opaque
stringData:
  postgres-password: "DolphinPgDev!72"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dolphinscheduler-env
  namespace: dolphinscheduler
data:
  TZ: "Asia/Shanghai"
  DATABASE: "postgresql"
  SPRING_JACKSON_TIME_ZONE: "UTC"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/dolphinscheduler"
  SPRING_DATASOURCE_USERNAME: "root"
  REGISTRY_ZOOKEEPER_CONNECT_STRING: "zookeeper:2181"
  # Worker é»کè®¤ç»„ï¼›هڈ¯وŒ‰éœ€ه¢‍هˆ 
  WORKER_GROUPS: "default"
---
# ---------- PostgreSQLï¼ˆه…ƒو•°وچ®ه؛“ï¼‰----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: dolphinscheduler
  labels:
    app: dolphinscheduler
    component: postgres
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dolphinscheduler
      component: postgres
  template:
    metadata:
      labels:
        app: dolphinscheduler
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "root"
            - name: POSTGRES_DB
              value: "dolphinscheduler"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dolphinscheduler-secrets
                  key: postgres-password
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U root -d dolphinscheduler
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "10m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: dolphinscheduler
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: dolphinscheduler
    component: postgres
---
# ---------- ZooKeeperï¼ˆو³¨ه†Œن¸­ه؟ƒï¼‰----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: dolphinscheduler
  labels:
    app: dolphinscheduler
    component: zookeeper
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dolphinscheduler
      component: zookeeper
  template:
    metadata:
      labels:
        app: dolphinscheduler
        component: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: zookeeper:3.9
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2181
              name: client
            - containerPort: 2888
              name: follower
            - containerPort: 3888
              name: election
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          readinessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "10m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: datalog
              mountPath: /datalog
      volumes:
        - name: data
          emptyDir: {}
        - name: datalog
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: dolphinscheduler
spec:
  type: ClusterIP
  ports:
    - port: 2181
      targetPort: 2181
      name: client
  selector:
    app: dolphinscheduler
    component: zookeeper
---
# ---------- API ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dolphinscheduler-api
  namespace: dolphinscheduler
  labels:
    app: dolphinscheduler
    component: api
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dolphinscheduler
      component: api
  template:
    metadata:
      labels:
        app: dolphinscheduler
        component: api
    spec:
      initContainers:
        - name: wait-deps
          image: busybox:stable
          command:
            - /bin/sh
            - -c
            - |
              until nc -z postgres 5432; do echo waiting postgres; sleep 2; done
              until nc -z zookeeper 2181; do echo waiting zk; sleep 2; done
        - name: db-migrate
          image: apache/dolphinscheduler-tools:3.2.2
          imagePullPolicy: IfNotPresent
          workingDir: /opt/dolphinscheduler
          command: ["bash", "tools/bin/upgrade-schema.sh"]
          envFrom:
            - configMapRef:
                name: dolphinscheduler-env
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dolphinscheduler-secrets
                  key: postgres-password
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      containers:
        - name: api
          image: apache/dolphinscheduler-api:3.2.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 12345
              name: http
            - containerPort: 25333
              name: rpc
          envFrom:
            - configMapRef:
                name: dolphinscheduler-env
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dolphinscheduler-secrets
                  key: postgres-password
            - name: SPRING_CLOUD_KUBERNETES_ENABLED
              value: "false"
            - name: SPRING_CLOUD_KUBERNETES_CONFIG_ENABLED
              value: "false"
            - name: SPRING_APPLICATION_JSON
              value: '{"spring":{"cloud":{"kubernetes":{"enabled":false,"config":{"enabled":false}}}}}'
            - name: JAVA_TOOL_OPTIONS
              value: "-Dspring.cloud.kubernetes.enabled=false -Dspring.cloud.kubernetes.config.enabled=false"
          volumeMounts:
            - name: logs
              mountPath: /opt/dolphinscheduler/logs
            - name: soft
              mountPath: /opt/soft
            - name: resource
              mountPath: /dolphinscheduler
          readinessProbe:
            httpGet:
              path: /dolphinscheduler/actuator/health
              port: 12345
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /dolphinscheduler/actuator/health
              port: 12345
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: logs
          emptyDir: {}
        - name: soft
          emptyDir: {}
        - name: resource
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dolphinscheduler-api
  namespace: dolphinscheduler
spec:
  type: ClusterIP
  ports:
    - port: 12345
      targetPort: 12345
      name: http
  selector:
    app: dolphinscheduler
    component: api
---
# ---------- Master ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dolphinscheduler-master
  namespace: dolphinscheduler
  labels:
    app: dolphinscheduler
    component: master
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dolphinscheduler
      component: master
  template:
    metadata:
      labels:
        app: dolphinscheduler
        component: master
    spec:
      initContainers:
        - name: wait-deps
          image: busybox:stable
          command:
            - /bin/sh
            - -c
            - |
              until nc -z postgres 5432; do echo waiting postgres; sleep 2; done
              until nc -z zookeeper 2181; do echo waiting zk; sleep 2; done
        - name: wait-schema
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: dolphinscheduler-secrets
                  key: postgres-password
          command:
            - /bin/sh
            - -c
            - |
              until psql -h postgres -U root -d dolphinscheduler -tAc \
                "SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='t_ds_user'" \
                2>/dev/null | grep -qx 1; do
                echo waiting dolphinscheduler schema...
                sleep 3
              done
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      containers:
        - name: master
          image: apache/dolphinscheduler-master:3.2.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5678
            - containerPort: 5679
          envFrom:
            - configMapRef:
                name: dolphinscheduler-env
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dolphinscheduler-secrets
                  key: postgres-password
            # ه®¹ه™¨ه†…çœ‹هˆ°çڑ„م€Œç³»ç»ںه†…ه­کم€چه¸¸ن¸؛ cgroup/و•´وœ؛هچ ç”¨ï¼›Docker Desktop ن¸ٹوک“ >70% è§¦هڈ‘é»کè®¤ن؟‌وٹ¤ï¼ŒMaster ن¸€ç›´ BUSY ن¸چه…¥ç½‘
            # هگŒو—¶ه…³é—­ Spring Cloud Kubernetesï¼ˆن»… SPRING_CLOUD_* هœ¨éƒ¨هˆ†ç‰ˆوœ¬ن¸چه¤ںو—©ï¼Œهگˆه¹¶è؟› JSON + JVM -Dï¼‰
            - name: SPRING_APPLICATION_JSON
              value: '{"spring":{"cloud":{"kubernetes":{"enabled":false,"config":{"enabled":false}}}},"master":{"server-load-protection":{"max-system-memory-usage-percentage-thresholds":0.98,"max-system-cpu-usage-percentage-thresholds":0.99}}}'
            - name: SPRING_CLOUD_KUBERNETES_ENABLED
              value: "false"
            - name: SPRING_CLOUD_KUBERNETES_CONFIG_ENABLED
              value: "false"
            - name: JAVA_TOOL_OPTIONS
              value: "-Dspring.cloud.kubernetes.enabled=false -Dspring.cloud.kubernetes.config.enabled=false"
          volumeMounts:
            - name: logs
              mountPath: /opt/dolphinscheduler/logs
            - name: soft
              mountPath: /opt/soft
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 5679
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: logs
          emptyDir: {}
        - name: soft
          emptyDir: {}
---
# ---------- Worker ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dolphinscheduler-worker
  namespace: dolphinscheduler
  labels:
    app: dolphinscheduler
    component: worker
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dolphinscheduler
      component: worker
  template:
    metadata:
      labels:
        app: dolphinscheduler
        component: worker
    spec:
      initContainers:
        - name: wait-deps
          image: busybox:stable
          command:
            - /bin/sh
            - -c
            - |
              until nc -z postgres 5432; do echo waiting postgres; sleep 2; done
              until nc -z zookeeper 2181; do echo waiting zk; sleep 2; done
        - name: wait-schema
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: dolphinscheduler-secrets
                  key: postgres-password
          command:
            - /bin/sh
            - -c
            - |
              until psql -h postgres -U root -d dolphinscheduler -tAc \
                "SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='t_ds_user'" \
                2>/dev/null | grep -qx 1; do
                echo waiting dolphinscheduler schema...
                sleep 3
              done
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      containers:
        - name: worker
          image: apache/dolphinscheduler-worker:3.2.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1234
            - containerPort: 1235
          envFrom:
            - configMapRef:
                name: dolphinscheduler-env
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dolphinscheduler-secrets
                  key: postgres-password
            - name: SPRING_APPLICATION_JSON
              value: '{"spring":{"cloud":{"kubernetes":{"enabled":false,"config":{"enabled":false}}}},"worker":{"server-load-protection":{"max-system-memory-usage-percentage-thresholds":0.98}}}'
            # 3.2 WorkerConfig.worker-addressï¼›وœھè®¾و—¶ NetUtils.getAddr هœ¨ه®¹ه™¨ه†…ه¸¸ن¸چهڈ¯é‌  â†’ ه®‍ن¾‹ host ن¸؛ç©؛
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: JAVA_TOOL_OPTIONS
              value: "-Dworker.worker-address=$(MY_POD_IP):1234 -Dspring.cloud.kubernetes.enabled=false -Dspring.cloud.kubernetes.config.enabled=false"
            - name: SPRING_CLOUD_KUBERNETES_ENABLED
              value: "false"
            - name: SPRING_CLOUD_KUBERNETES_CONFIG_ENABLED
              value: "false"
          volumeMounts:
            - name: worker-data
              mountPath: /tmp/dolphinscheduler
            - name: logs
              mountPath: /opt/dolphinscheduler/logs
            - name: soft
              mountPath: /opt/soft
            - name: resource
              mountPath: /dolphinscheduler
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 1235
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: worker-data
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: soft
          emptyDir: {}
        - name: resource
          emptyDir: {}
---
