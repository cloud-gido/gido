

# 需集群已安装 Ingress Controller（如 ingress-nginx），与 k8s/flink-sql-gateway-ingress.yaml 相同前提。
# 使用前将 host 改成你的域名，并在本机 /etc/hosts 或 DNS 指向 Ingress IP。
#
#   kubectl apply -f k8s/gido-ingress.yaml
#
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gido-ui
  namespace: gido
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-body-size: "256m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "320"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "320"
spec:
  ingressClassName: nginx
  rules:
    - host: gido.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
