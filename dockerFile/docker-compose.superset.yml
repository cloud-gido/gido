# Apache Superset — 默认复用已有 PostgreSQL / Redis
#
# 前置（在已有 PG 里建 Superset 元库，只需一次）：
#   docker exec -it $(docker ps -qf name=postgres) psql -U root -c "CREATE DATABASE superset;"
#
# 配置：cp superset/.env.example superset/.env  按本机改 REDIS_HOST 等
#
# 启动（需 Dolphin 的 PG 已 up，且在同一 Docker 网络）：
#   cd dockerFile
#   docker compose -f docker-compose.superset.yml up -d
#
# 没有现成 PG/Redis 时（使用本地 daocloud 镜像，自带 db+redis）：
#   docker compose -f docker-compose.superset.yml -f docker-compose.superset.bundled.yml up -d
#
# 只要 Web、不启 Celery：在 .env 设 COMPOSE_PROFILES= 或 compose 时 --profile 留空（见 bundled 文件注释）
# UI：http://localhost:8088
#
# 镜像拉取（国内勿用 docker.io 直连，易 timeout）：
#   bash superset/pull-image.sh
#   或：docker pull docker.m.daocloud.io/apache/superset:4.0.2
# compose 默认 SUPERSET_IMAGE 指向 DaoCloud，见 superset/.env.example

name: superset-docker

x-superset-image: &superset-image ${SUPERSET_IMAGE:-docker.m.daocloud.io/apache/superset:4.0.2}

x-superset-env: &superset-env
  SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
  SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-gido_dev_superset_secret_change_me}
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://root:DolphinPgDev%2172@postgres:5432/superset}
  REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  REDIS_DB_CACHE: ${REDIS_DB_CACHE:-2}
  REDIS_DB_CELERY_BROKER: ${REDIS_DB_CELERY_BROKER:-0}
  REDIS_DB_CELERY_RESULT: ${REDIS_DB_CELERY_RESULT:-1}
  SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
  SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
  SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@gido.local}

x-superset-volumes: &superset-volumes
  - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro

x-superset-init: &superset-init
  - /bin/bash
  - -ec
  - |
    echo "等待 PostgreSQL…"
    for i in $(seq 1 60); do
      python3 -c "import os; from sqlalchemy import create_engine; create_engine(os.environ['DATABASE_URL']).connect()" 2>/dev/null && break
      sleep 2
    done
    python3 -c "import os; from sqlalchemy import create_engine; create_engine(os.environ['DATABASE_URL']).connect()" \
      || { echo "无法连接 DATABASE_URL；请建库 superset 并检查 superset/.env"; exit 1; }
    echo "等待 Redis $${REDIS_HOST}:$${REDIS_PORT}…"
    python3 - <<'PY'
    import os, socket, time
    host, port = os.environ.get("REDIS_HOST", "redis"), int(os.environ.get("REDIS_PORT", "6379"))
    for _ in range(60):
        try:
            s = socket.create_connection((host, port), 2)
            s.close()
            break
        except OSError:
            time.sleep(2)
    else:
        raise SystemExit(
            f"无法连接 Redis {host}:{port}（已等待约 120s）。"
            " 请在本机启动 Redis: docker run -d -p 6379:6379 redis:7-alpine"
            " 或使用: docker compose -f docker-compose.superset.yml -f docker-compose.superset.bundled.yml up -d"
        )
    PY
    superset db upgrade
    superset fab create-admin \
      --username "$${SUPERSET_ADMIN_USERNAME}" \
      --firstname Admin \
      --lastname User \
      --email "$${SUPERSET_ADMIN_EMAIL}" \
      --password "$${SUPERSET_ADMIN_PASSWORD}" || true
    superset init

services:
  superset-init:
    image: *superset-image
    command: *superset-init
    env_file:
      - path: ./superset/.env
        required: false
    environment: *superset-env
    volumes: *superset-volumes
    networks: [gido-ext]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"

  superset:
    image: *superset-image
    restart: unless-stopped
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    env_file:
      - path: ./superset/.env
        required: false
    environment: *superset-env
    volumes: *superset-volumes
    networks: [gido-ext]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      superset-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8088/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

  superset-worker:
    image: *superset-image
    restart: unless-stopped
    profiles: [celery]
    command:
      - /bin/bash
      - -ec
      - |
        celery --app=superset.tasks.celery_app:app worker --pool=prefork -O fair -c ${SUPERSET_CELERY_CONCURRENCY:-2}
    env_file:
      - path: ./superset/.env
        required: false
    environment: *superset-env
    volumes: *superset-volumes
    networks: [gido-ext]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      superset-init:
        condition: service_completed_successfully

  superset-worker-beat:
    image: *superset-image
    restart: unless-stopped
    profiles: [celery]
    command:
      - /bin/bash
      - -ec
      - |
        celery --app=superset.tasks.celery_app:app beat --pidfile /tmp/celerybeat.pid --schedule /tmp/celerybeat-schedule
    env_file:
      - path: ./superset/.env
        required: false
    environment: *superset-env
    volumes: *superset-volumes
    networks: [gido-ext]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      superset-init:
        condition: service_completed_successfully

networks:
  gido-ext:
    external: true
    name: ${SUPERSET_DOCKER_NETWORK:-dolphinscheduler-docker_default}
