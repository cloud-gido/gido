# 叠加文件：没有现成 PG/Redis 时使用（镜像与本地 daocloud 拉取一致）
#   docker compose -f docker-compose.superset.yml -f docker-compose.superset.bundled.yml up -d
#
# 会起独立 PG（宿主机 5433）+ Redis，并改用内部网络 superset-internal（不再依赖 Dolphin 网络）

name: superset-docker

services:
  redis:
    image: ${REDIS_IMAGE:-docker.m.daocloud.io/library/redis:7.4-alpine}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    networks: [superset-internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: ${POSTGRES_IMAGE:-docker.m.daocloud.io/library/postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: ${SUPERSET_PG_PASSWORD:-SupersetPgDev!72}
      POSTGRES_DB: superset
    ports:
      - "${SUPERSET_PG_HOST_PORT:-5433}:5432"
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    networks: [superset-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 5s
      timeout: 5s
      retries: 20

  superset-init:
    environment:
      DATABASE_URL: postgresql+psycopg2://superset:${SUPERSET_PG_PASSWORD:-SupersetPgDev!72}@db:5432/superset
      REDIS_HOST: redis
    networks: [superset-internal]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  superset:
    networks: [superset-internal]
    environment:
      DATABASE_URL: postgresql+psycopg2://superset:${SUPERSET_PG_PASSWORD:-SupersetPgDev!72}@db:5432/superset
      REDIS_HOST: redis

  superset-worker:
    networks: [superset-internal]
    environment:
      DATABASE_URL: postgresql+psycopg2://superset:${SUPERSET_PG_PASSWORD:-SupersetPgDev!72}@db:5432/superset
      REDIS_HOST: redis

  superset-worker-beat:
    networks: [superset-internal]
    environment:
      DATABASE_URL: postgresql+psycopg2://superset:${SUPERSET_PG_PASSWORD:-SupersetPgDev!72}@db:5432/superset
      REDIS_HOST: redis

networks:
  superset-internal:
    name: superset-docker-internal

volumes:
  superset_db_data:
