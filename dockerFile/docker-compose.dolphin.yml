# 用法：docker compose -f docker-compose.dolphin.yml up -d
# UI：http://localhost:12345/dolphinscheduler/ui  （默认 admin / dolphinscheduler123）
# GIDO（后端在 Docker 里）：DS_URL=http://host.docker.internal:12345/dolphinscheduler
#
# PostgreSQL：本 compose 为唯一 PG（postgres 服务）；映射宿主机 5432，便于 GIDO 使用 host.docker.internal:5432。
# 若启动报错「address already in use」，说明另有容器占用 5432（例如旧的 dolphinscheduler-postgresql），可先执行：
#   bash dockerFile/remove-legacy-postgres-on-5432.sh
#
# MySQL 数据源：ASF 镜像不带 MySQL JDBC，需本目录 jdbc/mysql-connector-j-8.0.33.jar（已 .gitignore）。
# 若无文件可下载：
#   curl -fsSL -o jdbc/mysql-connector-j-8.0.33.jar \
#     https://repo.maven.apache.org/maven2/com/mysql/mysql-connector-j/8.0.33/mysql-connector-j-8.0.33.jar

name: dolphinscheduler-docker

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_DB: dolphinscheduler
      POSTGRES_PASSWORD: DolphinPgDev!72
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d dolphinscheduler"]
      interval: 5s
      timeout: 5s
      retries: 20

  zookeeper:
    image: zookeeper:3.9
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    # 不用 nc/bash /dev/tcp（部分环境会假失败）；用镜像自带的 zkServer.sh
    healthcheck:
      test: ["CMD-SHELL", "zkServer.sh status || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 45s

  ds-schema:
    image: apache/dolphinscheduler-tools:3.2.2
    working_dir: /opt/dolphinscheduler
    mem_limit: 1024m
    command: ["/opt/dolphinscheduler/tools/bin/ds-schema-init.sh"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      DATABASE: postgresql
      SPRING_JACKSON_TIME_ZONE: UTC
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dolphinscheduler
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: DolphinPgDev!72
      DS_SCHEMA_MAX_ATTEMPTS: ${DS_SCHEMA_MAX_ATTEMPTS:-5}
    volumes:
      - ./dolphin/ds-schema-init.sh:/opt/dolphinscheduler/tools/bin/ds-schema-init.sh:ro

  dolphinscheduler-api:
    image: apache/dolphinscheduler-api:3.2.2
    ports:
      - "12345:12345"
    depends_on:
      postgres:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
      ds-schema:
        condition: service_completed_successfully
    environment:
      TZ: Asia/Shanghai
      DATABASE: postgresql
      SPRING_JACKSON_TIME_ZONE: UTC
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dolphinscheduler
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: DolphinPgDev!72
      REGISTRY_ZOOKEEPER_CONNECT_STRING: zookeeper:2181
      WORKER_GROUPS: default
      SPRING_CLOUD_KUBERNETES_ENABLED: "false"
      SPRING_CLOUD_KUBERNETES_CONFIG_ENABLED: "false"
      SPRING_APPLICATION_JSON: '{"spring":{"cloud":{"kubernetes":{"enabled":false,"config":{"enabled":false}}}}}'
      JAVA_TOOL_OPTIONS: "-Dspring.cloud.kubernetes.enabled=false -Dspring.cloud.kubernetes.config.enabled=false"
    volumes:
      - ./jdbc/mysql-connector-j-8.0.33.jar:/opt/dolphinscheduler/libs/mysql-connector-j-8.0.33.jar:ro

  dolphinscheduler-master:
    image: apache/dolphinscheduler-master:3.2.2
    restart: unless-stopped
    # Exit 137 = OOM；Mac 上 Docker Desktop 内存有限时需限制 Master 堆，或调大 Docker 内存到 ≥8G
    mem_limit: 1536m
    depends_on:
      postgres:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
      ds-schema:
        condition: service_completed_successfully
    environment:
      TZ: Asia/Shanghai
      DATABASE: postgresql
      SPRING_JACKSON_TIME_ZONE: UTC
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dolphinscheduler
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: DolphinPgDev!72
      REGISTRY_ZOOKEEPER_CONNECT_STRING: zookeeper:2181
      WORKER_GROUPS: default
      SPRING_CLOUD_KUBERNETES_ENABLED: "false"
      SPRING_CLOUD_KUBERNETES_CONFIG_ENABLED: "false"
      SPRING_APPLICATION_JSON: '{"spring":{"cloud":{"kubernetes":{"enabled":false,"config":{"enabled":false}}}},"master":{"server-load-protection":{"max-system-memory-usage-percentage-thresholds":0.98,"max-system-cpu-usage-percentage-thresholds":0.99}}}'
      JAVA_TOOL_OPTIONS: >-
        -Xms384m -Xmx1024m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError
        -Dspring.cloud.kubernetes.enabled=false
        -Dspring.cloud.kubernetes.config.enabled=false

  dolphinscheduler-worker:
    image: apache/dolphinscheduler-worker:3.2.2
    hostname: ds-worker
    depends_on:
      postgres:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
      ds-schema:
        condition: service_completed_successfully
    environment:
      TZ: Asia/Shanghai
      DATABASE: postgresql
      SPRING_JACKSON_TIME_ZONE: UTC
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dolphinscheduler
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: DolphinPgDev!72
      REGISTRY_ZOOKEEPER_CONNECT_STRING: zookeeper:2181
      WORKER_GROUPS: default
      SPRING_CLOUD_KUBERNETES_ENABLED: "false"
      SPRING_CLOUD_KUBERNETES_CONFIG_ENABLED: "false"
      SPRING_APPLICATION_JSON: '{"spring":{"cloud":{"kubernetes":{"enabled":false,"config":{"enabled":false}}}},"worker":{"server-load-protection":{"max-system-memory-usage-percentage-thresholds":0.98}}}'
      JAVA_TOOL_OPTIONS: "-Dworker.worker-address=ds-worker:1234 -Dspring.cloud.kubernetes.enabled=false -Dspring.cloud.kubernetes.config.enabled=false"
    volumes:
      - ./jdbc/mysql-connector-j-8.0.33.jar:/opt/dolphinscheduler/libs/mysql-connector-j-8.0.33.jar:ro

  dolphinscheduler-alert:
    image: apache/dolphinscheduler-alert-server:3.2.2
    depends_on:
      postgres:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
      ds-schema:
        condition: service_completed_successfully
    environment:
      TZ: Asia/Shanghai
      DATABASE: postgresql
      SPRING_JACKSON_TIME_ZONE: UTC
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dolphinscheduler
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: DolphinPgDev!72
      REGISTRY_ZOOKEEPER_CONNECT_STRING: zookeeper:2181
      SPRING_CLOUD_KUBERNETES_ENABLED: "false"
      SPRING_CLOUD_KUBERNETES_CONFIG_ENABLED: "false"
      SPRING_APPLICATION_JSON: '{"spring":{"cloud":{"kubernetes":{"enabled":false,"config":{"enabled":false}}}}}'
      JAVA_TOOL_OPTIONS: "-Dspring.cloud.kubernetes.enabled=false -Dspring.cloud.kubernetes.config.enabled=false"